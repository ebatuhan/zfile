spring:
  application:
    name: zfile
  datasource:
    url: jdbc:postgresql://postgres-zfile:5432/zfile_db
    username: postgres
    password: postgres
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
